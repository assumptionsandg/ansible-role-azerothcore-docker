---

- name: AzerothCore post-deployment configuration
  hosts: azerothcore
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  roles:
    - role: holliefae.azerothcore.azerothcore_install
    - role: holliefae.azerothcore.azerothcore_realmlist
      when: azerothcore_realmlist_enable | default(true) | bool
    - role: holliefae.azerothcore.azerothcore_user
      when: azerothcore_user_enable | default(true) | bool
