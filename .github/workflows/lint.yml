---
name: Lint Ansible
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install yamllint ansible-lint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

      - name: Run ansible-lint
        run: ansible-lint
