---

- block:
    - name: Set fact for bootstrap creds
      ansible.builtin.set_fact:
        azerothcore_user_soap_username: "{{ azerothcore_user_bootstrap_username }}"
        azerothcore_user_soap_password: "{{ azerothcore_user_bootstrap_password }}"

    - name: Check whether bootstrap user exists
      ansible.mysql.mysql_query:
        login_host: "{{ azerothcore_install_db_address | default(ansible_facts.default_ipv4.address) }}"
        login_port: "{{ azerothcore_install_db_port | default('63306') }}"
        login_user: root
        login_password: "{{ azerothcore_install_db_pwd }}"
        login_db: acore_auth
        query: "SELECT id FROM account WHERE username = %s"
        positional_args:
          - "{{ azerothcore_user_soap_username | upper }}"
      register: azerothcore_user_bootstrap_user_check
      no_log: true

    - name: Bootstrap AzerothCore SOAP admin via worldserver console
      ansible.builtin.shell: |
        timeout --kill-after=1s 5s bash -c '
          {
            printf "%s\n" "account create {{ azerothcore_user_soap_username }} {{ azerothcore_user_soap_password }} {{ azerothcore_user_soap_password }}"
            printf "%s\n" "account set gmlevel {{ azerothcore_user_soap_username }} 3 -1"
            sleep 1
          } | script -q /dev/null -c "docker attach acore-docker-ac-worldserver-1"
        '
      args:
        executable: /bin/bash
      register: azerothcore_user_bootstrap_user_create
      failed_when: azerothcore_user_bootstrap_user_create.rc not in [0, 124, 137]
      no_log: true
      when: azerothcore_user_bootstrap_user_check.query_result[0] | length == 0
  when: azerothcore_user_enable_bootstrap | bool

- name: Create users
  ansible.builtin.uri:
    url: "{{ azerothcore_user_soap_address }}"
    method: POST
    url_username: "{{ azerothcore_user_soap_username }}"
    url_password: "{{ azerothcore_user_soap_password }}"
    force_basic_auth: true
    headers:
      Content-Type: text/xml
    body: "{{ lookup('template', 'soap-account-create.xml.j2') }}"
    body_format: raw
  loop: "{{ azerothcore_user_list | dict2items }}"
  when: item.value.enabled | bool

- name: Set user gm status
  ansible.builtin.uri:
    url: "{{ azerothcore_user_soap_address }}"
    method: POST
    url_username: "{{ azerothcore_user_soap_username }}"
    url_password: "{{ azerothcore_user_soap_password }}"
    force_basic_auth: true
    headers:
      Content-Type: text/xml
    body: "{{ lookup('template', 'setgmlevel-account-create.xml.j2') }}"
    body_format: raw
  loop: "{{ azerothcore_user_list | dict2items }}"
  when: item.value.enabled | bool
